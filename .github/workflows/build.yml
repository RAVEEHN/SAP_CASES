name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller playwright requests openpyxl pywin32

      - name: Build EXE
        run: pyinstaller --onefile --name sap-cases --clean sap_cases.py

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag
        continue-on-error: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest dist/sap-cases.exe config.json `
            --title "Latest Build" `
            --notes "Download sap-cases.exe and config.json into the same folder. Edit config.json with your customer_number and email_to, then run: sap-cases.exe --customer YOUR_NUMBER --relogin"
